name: Build and Run Tests

on: 
  push:
    branches-ignore:
      - 'master'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Addon
        run: python dev/build.py --version 3.0.0 --addon_package data_vis
      - name: ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: data_vis_zip
          path: data_vis_3.0.0.zip

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - blender_version: "4.2"
            python_version: "3.11"
            url: "https://download.blender.org/release/Blender4.2/blender-4.2.19-linux-x64.tar.xz"
          - blender_version: "4.5"
            python_version: "3.11"
            url: "https://download.blender.org/release/Blender4.5/blender-4.5.8-linux-x64.tar.xz"
          - blender_version: "5.0"
            python_version: "3.11"
            url: "https://download.blender.org/release/Blender5.0/blender-5.0.1-linux-x64.tar.xz"
          - blender_version: "5.1"
            python_version: "3.13"
            url: "https://download.blender.org/release/Blender5.1/blender-5.1.0-linux-x64.tar.xz"
    steps:
    - uses: actions/checkout@v4
    - name: Cache Blender
      id: blender_cache
      uses: actions/cache@v4
      with:
        path: /home/runner/blender-${{ matrix.blender_version }}
        key: blender-${{ matrix.blender_version }}
    - name: Download Blender
      if: steps.blender_cache.outputs.cache-hit != 'true'
      run: curl ${{ matrix.url }} -o /home/runner/blender.tar.xz
    - name: Mkdir
      run: mkdir {/home/runner/.local/bin,/home/runner/blender-${{ matrix.blender_version }}} -p
    - name: Extract Blender
      if: steps.blender_cache.outputs.cache-hit != 'true'
      run: tar -xf /home/runner/blender.tar.xz -C /home/runner/blender-${{ matrix.blender_version }} --strip-components=1
    - name: Add Blender to PATH
      run: ln -sf /home/runner/blender-${{ matrix.blender_version }}/blender /home/runner/.local/bin/blender
    - name: Install pip dependencies
      if: steps.blender_cache.outputs.cache-hit != 'true'
      run: /home/runner/blender-${{ matrix.blender_version }}/${{ matrix.blender_version }}/python/bin/python${{ matrix.python_version }} -m pip install scipy
    - name: Install Blender Dependencies
      run: sudo apt-get install freeglut3-dev
    - name: Download Addon ZIP
      uses: actions/download-artifact@v4
      with:
        name: data_vis_zip
    - name: Prepare Addon Zip
      run: mkdir -p dev/tests/intermediate && cp data_vis_3.0.0.zip dev/tests/intermediate/data_vis_3.0.0.zip
    - name: Test
      run: BLENDER=/home/runner/blender-${{ matrix.blender_version }}/blender sh run_tests.sh
